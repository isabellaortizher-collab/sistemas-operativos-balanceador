version: '3'
services:
  backend1:
    build: ./backend1
    container_name: backend1
    networks:
      - red_balanceador

  backend2:
    build: ./backend2
    container_name: backend2
    networks:
      - red_balanceador

  backend3:
    build: ./backend3
    container_name: backend3
    networks:
      - red_balanceador

  balanceador:
    build: ./balanceador
    container_name: balanceador
    ports:
      - "8080:80"
    depends_on:
      - backend1
      - backend2
      - backend3
    networks:
      - red_balanceador

  apache-exporter:
    image: bitnami/apache-exporter:latest
    container_name: apache-exporter
    command: --scrape_uri=http://balanceador/server-status?auto
    ports:
      - "9117:9117"
    depends_on:
      - balanceador
    networks:
      - red_balanceador

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - red_balanceador

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - red_balanceador

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    networks:
      - red_balanceador

networks:
  red_balanceador:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
